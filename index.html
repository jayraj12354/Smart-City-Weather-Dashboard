<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyCast Weather</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
    <button id="themeSwitcher" class="btn-theme">🌙 Dark Mode</button>

    <div class="app-card">
        <h1>🌤 Smart Weather</h1>

        <div class="search-bar">
            <input type="text" id="inputCity" placeholder="Search city..." />
            <button id="btnSearch">Search</button>
        </div>

        <div id="loaderBox" class="hidden">
            <div class="loader"></div>
            <p>Loading weather...</p>
        </div>

        <div id="errorBox" class="hidden"></div>

        <div id="weatherCard" class="hidden">
            <h2 id="cityLabel"></h2>
            <p id="tempLabel"></p>
            <p id="weatherLabel"></p>

            <div class="suggestion-card">
                <h3>Suggestion</h3>
                <p id="wearText"></p>
                <p id="umbrellaText"></p>
            </div>
        </div>
    </div>

    <div class="app-card history-card">
        <h2>📍 Saved Cities</h2>

        <div class="history-filters">
            <input type="text" id="searchHistory" placeholder="Search..." />

            <select id="filterHistory">
                <option value="all">All</option>
                <option value="cold">Cold</option>
                <option value="moderate">Moderate</option>
                <option value="hot">Hot</option>
            </select>

            <select id="sortHistory">
                <option value="default">Sort</option>
                <option value="temp-asc">Temp ↑</option>
                <option value="temp-desc">Temp ↓</option>
                <option value="name-asc">Name A-Z</option>
            </select>
        </div>

        <div id="historyContainer"></div>
        <p id="avgTempText"></p>
    </div>
    <script src="./script.js"></script>
</body>
</html>
